name: RPGSpellcaster
version: 1.0.0
main: com.shahid.spellcaster.SpellcasterPlugin
api-version: '1.20'
description: Particle-Driven RPG Magic System
author: Shahid
website: https://github.com/shahid

commands:
  wand:
    description: Give yourself a magic wand
    usage: /wand <spell> [tier]
    permission: spellcaster.wand
    permission-message: "&cYou don't have permission to use this command."

  spellcaster:
    description: Spellcaster plugin management commands
    usage: /spellcaster <list|reload>
    permission: spellcaster.admin
    permission-message: "&cYou don't have permission to use this command."

permissions:
  spellcaster.wand:
    description: Allows getting a wand
    default: op
  spellcaster.cast:
    description: Allows casting spells
    default: true
  spellcaster.admin:
    description: Admin commands
    default: op
